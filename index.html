<!DOCTYPE html>
<html>
    <head>
        <title>Windows11 - Clone</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="https://th.bing.com/th/id/OIP.LSpaCdWt-f6diGjK9jWTUAHaHa?w=180&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" type="image/png">
    </head>
    <body>
        <!-- Main screen / Background -->
            <!-- Apps (Recycle, This PC, Chorme) -->

        <div class="main-screen">

            <!-- This PC -->
            <div class="icon-box">
                <img src="https://img.icons8.com/?size=100&id=0mB4XgmUmhiD&format=png&color=000000" alt="This PC">
                <p>This PC</p>
            </div>

            <!-- Network -->
            <div class="icon-box">
                <img src="https://img.icons8.com/?size=100&id=ioC7h3zM76qQ&format=png&color=000000" alt="Network">
                <p>Network</p>
            </div>

            <!-- Recycle Bin -->
            <div class="icon-box">     
                <img src="https://img.icons8.com/color/96/recycle-bin.png" alt="recycle-bin">
                <p>Recycle Bin</p> 
            </div>
        
            <!-- Control Panel -->
             <div class="icon-box">
                <img src="https://img.icons8.com/?size=100&id=UD9nG7mgbuXZ&format=png&color=000000" alt="Control Panel">
                <p>Control Panel</p>
             </div>

            <!-- Chrome -->
             <div class="icon-box">
                <img src="https://img.icons8.com/?size=100&id=ejub91zEY6Sl&format=png&color=000000" alt="Chrome">
                <p>Chrome</p>
             </div>
            
             <!-- Word -->
            <div class="icon-box">
                <img src="https://img.icons8.com/?size=100&id=u6yosU9wHn5s&format=png&color=000000" alt="Word">
                <p>Word</p>
            </div>

        </div>
        <!-- Footer (start menu etc) -->
        <div class="footer-screen">

            <!-- start Menu -->
            <div class="icon-mini-box">
                <img src="https://img.icons8.com/color/48/windows-11.png" alt="Start Menu">
            </div>
            
            <!-- Seach Bar -->
            <div class="searchbar">
                <img src="https://img.icons8.com/?size=100&id=132&format=png&color=000000" alt="Seach">
                <input type="text" placeholder="Search">
            </div>

        </div>
    </body>
</html>
